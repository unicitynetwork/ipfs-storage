[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/run/supervisord.pid
loglevel=info

[unix_http_server]
file=/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///run/supervisor.sock

# IPFS Daemon
[program:ipfs]
command=/usr/local/bin/start-ipfs.sh
user=ipfs
directory=/data/ipfs
autostart=true
autorestart=true
startsecs=10
startretries=3
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=IPFS_PATH="/data/ipfs",HOME="/data/ipfs"
priority=100

# nginx WSS Proxy
[program:nginx]
command=/usr/local/bin/start-nginx.sh
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=200
# nginx starts after IPFS is ready

# Pin List Worker (oneshot)
# Processes initial pin list after IPFS starts
[program:pin-worker]
command=/usr/local/bin/pin-list-worker.sh
user=ipfs
autostart=true
autorestart=false
startsecs=0
startretries=1
stopwaitsecs=300
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=IPFS_PATH="/data/ipfs",HOME="/data/ipfs"
priority=300

# Nostr Pin Service (continuous)
# Subscribes to Nostr relays and pins announced CIDs
[program:nostr-pinner]
command=python3 -u /usr/local/bin/nostr_pinner.py
autostart=true
autorestart=true
startsecs=10
startretries=3
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=IPFS_API_URL="http://127.0.0.1:5001"
priority=400
